name: API Tests CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:

  # =============================================
  # JOB 1 — Integration Tests (dummyjson.com)
  # =============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run integration tests
        run: |
          mvn test -Pintegration \
            -DBASE_URL=${{ secrets.BASE_URL_INTEGRATION }} \
            -DAUTH_URL=${{ secrets.AUTH_URL_INTEGRATION }} \
            -DAUTH_USERNAME=${{ secrets.AUTH_USERNAME }} \
            -DAUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-integration
          path: target/allure-results

  # =============================================
  # JOB 2 — Mock Tests (WireMock u Dockeru)
  # =============================================
  mock-tests:
    name: Mock Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Start WireMock container
        run: |
          docker run -d \
            --name mock-service \
            -p 8080:8080 \
            -v ${{ github.workspace }}/wiremock/mappings:/home/wiremock/mappings \
            wiremock/wiremock:latest

      - name: Wait for WireMock to be ready
        run: |
          echo "Waiting for WireMock..."
          until curl -sf http://localhost:8080/__admin/mappings; do
            sleep 2
          done
          echo "WireMock is ready!"

      - name: Run mock tests
        run: |
          mvn test -Pmock \
            -DBASE_URL=http://localhost:8080 \
            -DAUTH_URL=http://localhost:8080/auth/login \
            -DAUTH_USERNAME=${{ secrets.AUTH_USERNAME }} \
            -DAUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-mock
          path: target/allure-results

      - name: Stop WireMock container
        if: always()
        run: docker stop mock-service

  # =============================================
  # JOB 3 — Publish Allure Report to GitHub Pages
  # =============================================
  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    # Wait for both test jobs to finish
    needs: [ integration-tests, mock-tests ]
    # Always run even if tests failed
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download integration test results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-integration
          path: allure-results/integration

      - name: Download mock test results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-mock
          path: allure-results/mock

      - name: Merge all results
        run: |
          mkdir -p allure-results-merged
          cp -r allure-results/integration/. allure-results-merged/
          cp -r allure-results/mock/. allure-results-merged/

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results-merged
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report