version: '3.8'

services:

  # WireMock — fake API server
  mock-service:
    image: wiremock/wiremock:latest
    ports:
      - "8080:8080"
    volumes:
      # Mount our mappings into WireMock container
      - ./wiremock/mappings:/home/wiremock/mappings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/mappings"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Test runner — runs tests against WireMock
  api-tests:
    build: .
    environment:
      - BASE_URL=http://mock-service:8080
      - AUTH_URL=http://mock-service:8080/auth/login
      - AUTH_USERNAME=emilys
      - AUTH_PASSWORD=emilyspass
    depends_on:
      mock-service:
        condition: service_healthy
    volumes:
      - ./target/allure-results:/app/target/allure-results